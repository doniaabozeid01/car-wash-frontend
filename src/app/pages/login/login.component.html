<div class="login-page" [class.login-page--enter]="fromSplash">
  <div class="login-page__bg"></div>

  <main class="login-page__main">
    <div class="login-card glass-card" [class.login-card--enter]="fromSplash">
      <h1 class="login-card__title">Welcome Back</h1>
      <p class="login-card__subtitle">Sign in to manage your vehicle services</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-card__form">
        <div class="form-field">
          <label for="phone">Phone Number</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <line x1="12" y1="18" x2="12" y2="18.01"/>
            </svg>
            <input id="phone" type="tel" formControlName="phone" placeholder="01119763303">
          </div>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <p class="login-card__error" *ngIf="loginError">{{ loginError }}</p>

        <button type="submit" class="btn-gold login-card__submit" [disabled]="loginForm.invalid">
          Sign In
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <p class="login-card__register">
        Don't have an account?
        <a routerLink="/register">Register</a>
      </p>

      <div class="login-card__divider"></div>

      <p class="login-card__note">
        <span class="login-card__star">★</span>
        Earn points every time you wash.
      </p>
    </div>
  </main>
</div>
