<div class="login-page" [class.login-page--enter]="fromSplash">
  <div class="login-page__bg"></div>
  <div class="login-page__lang">
    <app-language-toggle [compact]="true"></app-language-toggle>
  </div>

  <main class="login-page__main">
    <div class="login-card glass-card" [class.login-card--enter]="fromSplash">
      <img src="assets/logo.png" [alt]="'common.brand' | translate" class="login-card__logo">
      <h1 class="login-card__title">{{ 'login.title' | translate }}</h1>
      <p class="login-card__subtitle">{{ 'login.subtitle' | translate }}</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-card__form">
        <div class="form-field">
          <label for="phone">{{ 'common.phone' | translate }}</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <line x1="12" y1="18" x2="12" y2="18.01"/>
            </svg>
            <input id="phone" type="tel" formControlName="phone" placeholder="01119763303">
          </div>
        </div>

        <div class="form-field">
          <label for="password">{{ 'common.password' | translate }}</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <p class="login-card__error" *ngIf="loginError">{{ loginError | translate }}</p>

        <button type="submit" class="btn-gold login-card__submit" [disabled]="loginForm.invalid">
          {{ 'login.signIn' | translate }}
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <p class="login-card__register">
        {{ 'login.noAccount' | translate }}
        <a routerLink="/register">{{ 'login.register' | translate }}</a>
      </p>

      <div class="login-card__divider"></div>

      <p class="login-card__note">
        <span class="login-card__star">★</span>
        {{ 'login.note' | translate }}
      </p>
    </div>
  </main>
</div>
