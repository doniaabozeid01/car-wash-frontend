<div class="cashier-page" *ngIf="cashier">
  <div class="cashier-page__bg"></div>

  <header class="cashier-page__header">
    <div class="cashier-page__header-inner">
      <div class="cashier-page__brand">
        <a routerLink="/" class="cashier-page__logo-link">
          <img src="assets/logo.png" [alt]="'common.brand' | translate" class="cashier-page__logo">
        </a>
        <div class="cashier-page__cashier-info">
          <h1 class="cashier-page__cashier-name">{{ cashier.fullName }}</h1>
          <p class="cashier-page__cashier-phone">{{ cashier.phoneNumber }}</p>
        </div>
      </div>
      <div class="cashier-page__actions">
        <app-language-toggle [compact]="true"></app-language-toggle>
        <button
          type="button"
          class="cashier-page__logout-icon"
          (click)="logout()"
          [attr.aria-label]="'common.logout' | translate"
          [title]="'common.logout' | translate">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="cashier-page__main">
    <div class="cashier-workspace">
      <nav class="cashier-nav">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          routerLinkActive="cashier-nav__link--active"
          class="cashier-nav__link">
          {{ item.labelKey | translate }}
        </a>
      </nav>

      <router-outlet></router-outlet>
    </div>
  </main>
</div>
