<div class="register-page">
  <div class="register-page__bg"></div>

  <main class="register-page__main">
    <div class="register-card glass-card">
      <img src="assets/logo.png" alt="FULL CARS" class="register-card__logo">
      <h2 class="register-card__title">Create Account</h2>
      <p class="register-card__subtitle">Sign up to start earning rewards on every wash</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-card__form">
        <div class="form-field">
          <label for="fullName">Full Name</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="fullName" type="text" formControlName="fullName" placeholder="Johnathan Doe">
          </div>
        </div>

        <div class="form-field">
          <label for="regPhone">Phone Number</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <line x1="12" y1="18" x2="12" y2="18.01"/>
            </svg>
            <input id="regPhone" type="tel" formControlName="phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>

        <div class="form-field">
          <label for="regPassword">Password</label>
          <div class="input-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input id="regPassword" type="password" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <label class="register-card__terms">
          <input type="checkbox" formControlName="agreeTerms">
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="btn-gold" [disabled]="registerForm.invalid">Create Account</button>
      </form>

      <p class="register-card__signin">
        Already a member? <a routerLink="/login">SIGN IN</a>
      </p>
    </div>
  </main>
</div>
